<!DOCTYPE html>
<html>
<head>
    <title>Customers</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2>Registered Customer</h2>

<a href="/register" class="btn btn-primary mb-3">
Add Customers
</a>

<a href="/dashboard" class="btn btn-secondary mb-3">
Dashboard
</a>

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>ID</th>
<th>Reg No</th>
<th>First Name</th>
<th>Last Name</th>
<th>Gender</th>
<th>Class</th>
<th>Phone</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
<td>{{ student[3] }}</td>
<td>{{ student[4] }}</td>
<td>{{ student[6] }}</td>
<td>{{ student[7] }}</td>

<td>

<a href="/edit_student/{{ student[0] }}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="/delete_student/{{ student[0] }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this student?')">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
