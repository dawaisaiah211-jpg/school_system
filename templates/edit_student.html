<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
</head>
<body>

<h2>Edit Student</h2>

<form method="POST">

Registration No:<br>
<input type="text" name="reg_no" value="{{ student[1] }}"><br><br>

First Name:<br>
<input type="text" name="firstname" value="{{ student[2] }}"><br><br>

Last Name:<br>
<input type="text" name="lastname" value="{{ student[3] }}"><br><br>

Gender:<br>
<input type="text" name="gender" value="{{ student[4] }}"><br><br>

Date of Birth:<br>
<input type="date" name="dob" value="{{ student[5] }}"><br><br>

Class:<br>
<input type="text" name="class" value="{{ student[6] }}"><br><br>

Phone:<br>
<input type="text" name="phone" value="{{ student[7] }}"><br><br>

Address:<br>
<textarea name="address">{{ student[8] }}</textarea><br><br>

<button type="submit">Update Student</button>

</form>

</body>
</html>
