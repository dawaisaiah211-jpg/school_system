<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customer Management Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">
            Customer Management System
        </a>

        <a href="/logout" class="btn btn-light">
            Logout
        </a>
    </div>
</nav>

<div class="container mt-4">

    <div class="row">

        <div class="col-md-6 mb-3">
            <div class="card bg-primary text-white shadow">
                <div class="card-body">
                    <h5>Total Customer</h5>
                    <h1>{{ total_students }}</h1>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <div class="card bg-success text-white shadow">
                <div class="card-body">
                    <h5>System Users</h5>
                    <h1>{{ total_users }}</h1>
                </div>
            </div>
        </div>

    </div>

    <div class="row mt-4">

        <div class="col-md-4 mb-3">
            <a href="/register" class="btn btn-primary w-100">
                Register Customers
            </a>
        </div>

        <div class="col-md-4 mb-3">
            <a href="/students" class="btn btn-success w-100">
                View Customers
            </a>
        </div>

        <div class="col-md-4 mb-3">
            <a href="/logout" class="btn btn-danger w-100">
                Logout
            </a>
        </div>

    </div>

</div>

</body>
</html>
