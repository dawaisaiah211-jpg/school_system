<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Register Customers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Customers Registration</h3>

</div>

<div class="card-body">

<form method="POST">

<input class="form-control mb-3" name="reg_no" placeholder="Registration Number">

<input class="form-control mb-3" name="firstname" placeholder="First Name">

<input class="form-control mb-3" name="lastname" placeholder="Last Name">

<select class="form-control mb-3" name="gender">

<option>Male</option>

<option>Female</option>

</select>

<input class="form-control mb-3" type="date" name="dob">

<input class="form-control mb-3" name="class" placeholder="Class">

<input class="form-control mb-3" name="phone" placeholder="Phone">

<textarea class="form-control mb-3" name="address" placeholder="Address"></textarea>

<button class="btn btn-primary">
Save Customer
</button>

<a href="/dashboard" class="btn btn-secondary">
Dashboard
</a>

</form>

</div>

</div>

</div>

</body>
</html>
